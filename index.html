<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rim Medical — معدات ومستلزمات طبية</title>
<meta name="description" content="Rim Medical — بيع وتوريد المعدات والمستلزمات الطبية للأفراد والمؤسسات. أسرّة طبية، كراسي متحركة، أجهزة قياس، دعامات، ومستلزمات العناية المنزلية.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%230fb9b1'/%3E%3Cpath d='M12 5v14M5 12h14' stroke='%23fff' stroke-width='3.2' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* =========================================================
   1) المتغيرات والأساسيات
   ========================================================= */
:root{
  --navy:#0a2647;
  --navy-2:#123b6d;
  --navy-3:#1b4d94;
  --teal:#0fb9b1;
  --teal-dark:#0a8f89;
  --gold:#c9a24b;
  --gold-light:#e8cf96;
  --bg:#f4f8fc;
  --card:#ffffff;
  --ink:#13253d;
  --muted:#5d7290;
  --line:#e3ebf4;
  --shadow-sm:0 2px 8px rgba(10,38,71,.06);
  --shadow-md:0 10px 30px rgba(10,38,71,.10);
  --shadow-lg:0 24px 60px rgba(10,38,71,.16);
  --radius:18px;
  --font-ar:'Tajawal',sans-serif;
  --font-lat:'Manrope','Tajawal',sans-serif;
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-ar);
  background:var(--bg);
  color:var(--ink);
  line-height:1.7;
  overflow-x:hidden;
}
html[dir="ltr"] body{font-family:var(--font-lat)}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.container{width:min(1180px,92%);margin-inline:auto}
section{padding:76px 0}
.section-head{text-align:center;max-width:640px;margin:0 auto 46px}
.section-head .kicker{
  display:inline-block;font-size:.85rem;font-weight:700;color:var(--teal-dark);
  background:rgba(15,185,177,.1);border:1px solid rgba(15,185,177,.25);
  padding:4px 16px;border-radius:999px;margin-bottom:14px;letter-spacing:.5px;
}
.section-head h2{font-size:clamp(1.6rem,3.2vw,2.3rem);font-weight:800;color:var(--navy);margin-bottom:10px}
.section-head p{color:var(--muted)}

/* =========================================================
   2) شاشة اختيار اللغة (أول زيارة)
   ========================================================= */
#langGate{
  position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(1000px 600px at 80% -10%,rgba(15,185,177,.25),transparent 60%),
    radial-gradient(800px 500px at 10% 110%,rgba(201,162,75,.18),transparent 60%),
    linear-gradient(150deg,#081e3a,#0a2647 55%,#123b6d);
  opacity:1;visibility:visible;transition:opacity .5s var(--ease),visibility .5s;
}
#langGate.hidden{opacity:0;visibility:hidden;pointer-events:none}
.gate-card{text-align:center;padding:32px;animation:gateIn .8s var(--ease) both}
@keyframes gateIn{from{opacity:0;transform:translateY(26px) scale(.97)}to{opacity:1;transform:none}}
.gate-logo{
  width:86px;height:86px;margin:0 auto 20px;border-radius:24px;
  background:linear-gradient(145deg,var(--teal),var(--teal-dark));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 18px 40px rgba(15,185,177,.35);
}
.gate-logo svg{width:48px;height:48px}
.gate-card h1{color:#fff;font-size:clamp(1.5rem,4vw,2.1rem);font-weight:800;letter-spacing:.5px}
.gate-card .gate-sub{color:rgba(255,255,255,.6);margin:6px 0 34px;font-size:.95rem}
.gate-langs{display:flex;flex-direction:column;gap:14px;width:min(340px,80vw);margin-inline:auto}
.gate-lang{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:15px 22px;border-radius:16px;color:#fff;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);
  backdrop-filter:blur(8px);font-size:1.05rem;font-weight:700;
  transition:transform .3s var(--ease),background .3s,border-color .3s,box-shadow .3s;
}
.gate-lang .g-native{font-size:1.1rem}
.gate-lang .g-hint{font-size:.78rem;font-weight:400;color:rgba(255,255,255,.55)}
.gate-lang:hover{
  transform:translateY(-3px);background:rgba(15,185,177,.22);
  border-color:var(--teal);box-shadow:0 14px 32px rgba(0,0,0,.3);
}
.gate-foot{margin-top:30px;color:rgba(255,255,255,.35);font-size:.8rem;letter-spacing:2px}

/* =========================================================
   3) الترويسة (Header)
   ========================================================= */
header{
  position:fixed;top:0;inset-inline:0;z-index:600;
  transition:background .35s,box-shadow .35s,padding .35s;
  padding:18px 0;background:transparent;
}
header.scrolled{background:rgba(255,255,255,.92);backdrop-filter:blur(14px);box-shadow:var(--shadow-sm);padding:10px 0}
.nav-wrap{display:flex;align-items:center;justify-content:space-between;gap:18px}
.brand{display:flex;align-items:center;gap:12px}
.brand-logo{
  width:48px;height:48px;border-radius:14px;overflow:hidden;flex-shrink:0;
  background:linear-gradient(145deg,var(--teal),var(--teal-dark));
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);
}
.brand-logo img{width:100%;height:100%;object-fit:cover}
.brand-logo svg{width:27px;height:27px}
.brand-name{font-weight:800;font-size:1.2rem;color:#fff;line-height:1.2;transition:color .35s}
.brand-name small{display:block;font-size:.68rem;font-weight:500;color:rgba(255,255,255,.65);letter-spacing:1.5px;transition:color .35s}
header.scrolled .brand-name{color:var(--navy)}
header.scrolled .brand-name small{color:var(--muted)}
nav.main-nav{display:flex;gap:6px}
nav.main-nav a{
  color:rgba(255,255,255,.85);font-weight:500;font-size:.95rem;
  padding:8px 14px;border-radius:10px;transition:background .3s,color .3s;
}
nav.main-nav a:hover{background:rgba(255,255,255,.12);color:#fff}
header.scrolled nav.main-nav a{color:var(--ink)}
header.scrolled nav.main-nav a:hover{background:rgba(15,185,177,.1);color:var(--teal-dark)}
.header-actions{display:flex;align-items:center;gap:10px}

/* زر تبديل اللغة */
.lang-switch{position:relative}
.lang-btn{
  display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:12px;
  color:#fff;font-weight:700;font-size:.9rem;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  transition:background .3s,color .35s,border-color .35s;
}
.lang-btn:hover{background:rgba(255,255,255,.22)}
header.scrolled .lang-btn{color:var(--navy);background:rgba(10,38,71,.06);border-color:var(--line)}
.lang-menu{
  position:absolute;top:calc(100% + 10px);inset-inline-end:0;min-width:170px;
  background:#fff;border-radius:14px;box-shadow:var(--shadow-lg);border:1px solid var(--line);
  padding:8px;opacity:0;visibility:hidden;transform:translateY(-8px);
  transition:all .3s var(--ease);z-index:700;
}
.lang-switch.open .lang-menu{opacity:1;visibility:visible;transform:none}
.lang-menu button{
  display:flex;align-items:center;justify-content:space-between;width:100%;
  padding:10px 14px;border-radius:10px;font-size:.92rem;font-weight:600;color:var(--ink);
  transition:background .25s;
}
.lang-menu button:hover{background:var(--bg)}
.lang-menu button.active{background:rgba(15,185,177,.12);color:var(--teal-dark)}
.burger{display:none;flex-direction:column;gap:5px;padding:10px}
.burger span{width:24px;height:2.5px;border-radius:2px;background:#fff;transition:background .35s}
header.scrolled .burger span{background:var(--navy)}
@media (max-width:900px){
  nav.main-nav{
    position:fixed;top:0;bottom:0;inset-inline-end:-300px;width:270px;z-index:800;
    background:var(--navy);flex-direction:column;padding:90px 24px;gap:8px;
    transition:inset-inline-end .4s var(--ease);box-shadow:var(--shadow-lg);
  }
  nav.main-nav.open{inset-inline-end:0}
  nav.main-nav a,header.scrolled nav.main-nav a{color:#fff;font-size:1.05rem}
  .burger{display:flex}
}

/* =========================================================
   4) قسم البطل (Hero)
   ========================================================= */
.hero{
  position:relative;min-height:92vh;display:flex;align-items:center;padding:150px 0 90px;
  background:
    radial-gradient(900px 500px at 85% 0%,rgba(15,185,177,.28),transparent 55%),
    radial-gradient(700px 450px at 0% 100%,rgba(201,162,75,.14),transparent 60%),
    linear-gradient(160deg,#081e3a 0%,#0a2647 50%,#144a86 100%);
  overflow:hidden;
}
.hero::after{
  content:"";position:absolute;inset:0;opacity:.05;pointer-events:none;
  background-image:radial-gradient(circle at 1px 1px,#fff 1px,transparent 0);
  background-size:34px 34px;
}
.hero-grid{position:relative;z-index:2;display:grid;grid-template-columns:1.15fr .85fr;gap:50px;align-items:center}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:999px;
  background:rgba(15,185,177,.15);border:1px solid rgba(15,185,177,.4);
  color:#7ee8e2;font-size:.85rem;font-weight:700;margin-bottom:22px;
}
.hero h1{
  color:#fff;font-size:clamp(1.9rem,4.6vw,3.3rem);font-weight:900;line-height:1.35;margin-bottom:18px;
}
.hero h1 .accent{
  background:linear-gradient(90deg,var(--teal),#7ee8e2);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hero p{color:rgba(255,255,255,.7);font-size:1.06rem;max-width:520px;margin-bottom:34px}
.hero-cta{display:flex;flex-wrap:wrap;gap:14px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  padding:14px 30px;border-radius:14px;font-weight:700;font-size:1rem;
  transition:transform .3s var(--ease),box-shadow .3s,background .3s;
}
.btn:hover{transform:translateY(-3px)}
.btn-primary{
  color:#06231f;background:linear-gradient(135deg,#19d3ca,var(--teal));
  box-shadow:0 14px 34px rgba(15,185,177,.4);
}
.btn-primary:hover{box-shadow:0 20px 44px rgba(15,185,177,.5)}
.btn-outline{color:#fff;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.35)}
.btn-outline:hover{background:rgba(255,255,255,.14);border-color:#fff}
.btn-gold{
  color:#2f2405;background:linear-gradient(135deg,var(--gold-light),var(--gold));
  box-shadow:0 14px 34px rgba(201,162,75,.35);
}
.hero-reassure{
  margin-top:22px;color:rgba(255,255,255,.55);font-size:.87rem;
  display:flex;align-items:center;gap:8px;
}
.hero-visual{position:relative;display:flex;justify-content:center}
.hero-card{
  width:min(360px,100%);border-radius:26px;padding:30px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
  backdrop-filter:blur(14px);box-shadow:var(--shadow-lg);
  animation:floatY 6s ease-in-out infinite;
}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.hero-card .hc-icon{font-size:3rem;margin-bottom:12px}
.hero-card h3{color:#fff;font-size:1.15rem;margin-bottom:6px}
.hero-card p{color:rgba(255,255,255,.65);font-size:.9rem;margin:0}
.hero-card .hc-row{display:flex;align-items:center;gap:10px;margin-top:18px;padding-top:18px;border-top:1px solid rgba(255,255,255,.14)}
.hero-card .hc-dot{width:10px;height:10px;border-radius:50%;background:#2ee6a8;box-shadow:0 0 0 5px rgba(46,230,168,.18)}
.hero-card .hc-row span{color:rgba(255,255,255,.8);font-size:.85rem;font-weight:600}
.hero-chip{
  position:absolute;padding:10px 18px;border-radius:14px;font-size:.82rem;font-weight:700;
  background:#fff;color:var(--navy);box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:8px;animation:floatY 7s ease-in-out infinite;
}
.hero-chip.chip-1{top:6%;inset-inline-start:-4%;animation-delay:.8s}
.hero-chip.chip-2{bottom:4%;inset-inline-end:-2%;animation-delay:1.6s}
@media (max-width:900px){
  .hero-grid{grid-template-columns:1fr}
  .hero-visual{display:none}
  .hero{min-height:auto}
}

/* =========================================================
   5) شارات الثقة + الإحصائيات
   ========================================================= */
.trust-strip{padding:0;transform:translateY(-46px);margin-bottom:-20px}
.trust-cards{
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
  background:var(--card);border-radius:22px;box-shadow:var(--shadow-md);
  border:1px solid var(--line);padding:26px;
}
.trust-item{display:flex;align-items:center;gap:14px}
.trust-item .t-ico{
  width:50px;height:50px;flex-shrink:0;border-radius:14px;font-size:1.4rem;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,rgba(15,185,177,.14),rgba(15,185,177,.05));
  border:1px solid rgba(15,185,177,.25);
}
.trust-item h4{font-size:.95rem;color:var(--navy);font-weight:800}
.trust-item p{font-size:.8rem;color:var(--muted);margin:0}
@media (max-width:900px){.trust-cards{grid-template-columns:repeat(2,1fr)}}
@media (max-width:520px){.trust-cards{grid-template-columns:1fr}}
.stats{padding:60px 0}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;text-align:center}
.stat-box{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:30px 16px;box-shadow:var(--shadow-sm);
  transition:transform .35s var(--ease),box-shadow .35s;
}
.stat-box:hover{transform:translateY(-6px);box-shadow:var(--shadow-md)}
.stat-box .num{
  font-size:2.3rem;font-weight:900;color:var(--navy);
  font-family:var(--font-lat);line-height:1.2;
}
.stat-box .num .plus{color:var(--teal)}
.stat-box .lbl{color:var(--muted);font-size:.9rem;font-weight:600}
@media (max-width:760px){.stats-grid{grid-template-columns:repeat(2,1fr)}}

/* =========================================================
   6) التصنيفات
   ========================================================= */
.cats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.cat-card{
  position:relative;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);padding:30px 24px;overflow:hidden;cursor:pointer;
  transition:transform .4s var(--ease),box-shadow .4s,border-color .4s;
}
.cat-card::before{
  content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--teal),var(--gold));
  transform:scaleY(0);transform-origin:top;transition:transform .4s var(--ease);
}
.cat-card:hover{transform:translateY(-7px);box-shadow:var(--shadow-md);border-color:rgba(15,185,177,.4)}
.cat-card:hover::before{transform:scaleY(1)}
.cat-card .c-ico{
  width:58px;height:58px;border-radius:16px;font-size:1.7rem;margin-bottom:16px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,var(--navy),var(--navy-3));
  box-shadow:0 10px 22px rgba(10,38,71,.25);
}
.cat-card h3{color:var(--navy);font-size:1.08rem;font-weight:800;margin-bottom:6px}
.cat-card p{color:var(--muted);font-size:.88rem;margin-bottom:14px}
.cat-card .c-link{color:var(--teal-dark);font-weight:700;font-size:.88rem;display:inline-flex;align-items:center;gap:6px}
@media (max-width:900px){.cats-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:560px){.cats-grid{grid-template-columns:1fr}}

/* =========================================================
   7) المنتجات
   ========================================================= */
#products{background:linear-gradient(180deg,var(--bg),#eaf1f9 60%,var(--bg))}
.filter-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:38px}
.filter-chip{
  padding:9px 20px;border-radius:999px;font-weight:700;font-size:.88rem;color:var(--muted);
  background:var(--card);border:1.5px solid var(--line);
  transition:all .3s var(--ease);
}
.filter-chip:hover{border-color:var(--teal);color:var(--teal-dark)}
.filter-chip.active{
  background:linear-gradient(135deg,var(--navy),var(--navy-3));
  color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(10,38,71,.25);
}
.products-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.product-card{
  background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;
  display:flex;flex-direction:column;
  transition:transform .45s var(--ease),box-shadow .45s;
  transform-style:preserve-3d;
}
.product-card:hover{transform:translateY(-8px) rotateX(1.2deg);box-shadow:var(--shadow-lg)}
.p-media{
  position:relative;height:210px;cursor:zoom-in;overflow:hidden;
  background:linear-gradient(145deg,#eef4fa,#dde9f5);
  display:flex;align-items:center;justify-content:center;
}
.p-media img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease)}
.product-card:hover .p-media img{transform:scale(1.06)}
.p-media .p-emoji{font-size:4.2rem;filter:drop-shadow(0 10px 16px rgba(10,38,71,.18));transition:transform .5s var(--ease)}
.product-card:hover .p-emoji{transform:scale(1.12) translateY(-4px)}
.p-badge{
  position:absolute;top:14px;inset-inline-start:14px;z-index:2;
  padding:5px 14px;border-radius:999px;font-size:.75rem;font-weight:800;
}
.p-badge.best{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:#3a2b05;box-shadow:0 6px 16px rgba(201,162,75,.4)}
.p-badge.new{background:linear-gradient(135deg,#19d3ca,var(--teal));color:#06312e}
.p-cat-tag{
  position:absolute;bottom:12px;inset-inline-end:12px;padding:4px 12px;border-radius:999px;
  background:rgba(10,38,71,.75);color:#fff;font-size:.72rem;font-weight:600;backdrop-filter:blur(4px);
}
.p-body{padding:20px 22px 24px;display:flex;flex-direction:column;flex:1}
.p-body h3{color:var(--navy);font-size:1.06rem;font-weight:800;margin-bottom:6px}
.p-body .p-desc{color:var(--muted);font-size:.86rem;flex:1;margin-bottom:16px}
.p-foot{display:flex;align-items:center;justify-content:space-between;gap:12px}
.p-price{font-weight:900;color:var(--navy);font-size:1.05rem;font-family:var(--font-lat)}
.p-price small{font-size:.72rem;color:var(--muted);font-weight:600}
.p-price.ask{font-size:.85rem;color:var(--teal-dark);font-family:var(--font-ar)}
html[dir="ltr"] .p-price.ask{font-family:var(--font-lat)}
.btn-wa{
  display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;
  background:linear-gradient(135deg,#2bb673,#128c7e);color:#fff;font-weight:700;font-size:.85rem;
  box-shadow:0 8px 18px rgba(18,140,126,.32);
  transition:transform .3s var(--ease),box-shadow .3s;
}
.btn-wa:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(18,140,126,.42)}
.btn-wa svg{width:17px;height:17px;flex-shrink:0}
.no-products{grid-column:1/-1;text-align:center;color:var(--muted);padding:50px 0}
@media (max-width:960px){.products-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:600px){.products-grid{grid-template-columns:1fr}}

/* =========================================================
   7.5) شريط العبارة العاطفية
   ========================================================= */
.emotion-strip{padding:66px 0}
.emotion-inner{
  text-align:center;max-width:680px;margin-inline:auto;padding:44px 32px;
  background:var(--card);border:1px solid var(--line);border-radius:26px;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
}
.emotion-inner::before{
  content:"";position:absolute;top:0;inset-inline:0;height:4px;
  background:linear-gradient(90deg,var(--teal),var(--gold));
}
.emotion-inner .e-ico{font-size:2.2rem;display:block;margin-bottom:14px}
.emotion-inner h2{
  color:var(--navy);font-size:clamp(1.25rem,2.6vw,1.7rem);font-weight:800;
  line-height:1.6;margin-bottom:12px;
}
.emotion-inner p{color:var(--muted);font-size:.95rem;max-width:540px;margin-inline:auto}

/* =========================================================
   8) قسم المؤسسات (B2B)
   ========================================================= */
#b2b{padding:0}
.b2b-panel{
  position:relative;border-radius:28px;overflow:hidden;padding:64px 52px;
  background:

.float-wa{

}
@keyframes pulse{0%{transform:scale(.9);opacity:1}100%{transform:scale(1.35);opacity:0}}
#lightbox{

}

/* =========================================================
   الحالة العامة
   ========================================================= */
const LANG_KEY = "rim_medical_lang";
let DATA = RimStore.getData();
let currentLang = localStorage.getItem(LANG_KEY) || "ar";
let currentFilter = "all";

const $ = (s, ctx) => (ctx || document).querySelector(s);
const $$ = (s, ctx) => Array.from((ctx || document).querySelectorAll(s));
const t = (path) => path.split(".").reduce((o, k) => (o || {})[k], I18N[currentLang]) ?? "";

/* الفئات تأتي من البيانات (قابلة للإدارة من لوحة التحكم) */
const getCategories = () => DATA.categories || [];
const catName = (id) => {
  const c = getCategories().find(c => c.id === id);
  return c ? (c.name[currentLang] || c.name.ar) : "";
};
/* صور المنتج: يدعم صوراً متعددة مع توافق مع الصيغة القديمة (صورة واحدة) */
const productImages = (p) => (Array.isArray(p.images) && p.images.length)
  ? p.images
  : (p.image ? [p.image] : []);

/* =========================================================
   شاشة اختيار اللغة (أول زيارة فقط)
   ========================================================= */
const gate = $("#langGate");
if (localStorage.getItem(LANG_KEY)) {
  gate.classList.add("hidden");
}
$$(".gate-lang").forEach(btn => {
  btn.addEventListener("click", () => {
    setLang(btn.dataset.lang);
    gate.classList.add("hidden");
  });
});

/* =========================================================
   تطبيق اللغة على الصفحة
   ========================================================= */
function setLang(lang) {
  if (!I18N[lang]) lang = "ar";
  currentLang = lang;
  localStorage.setItem(LANG_KEY, lang);
  document.documentElement.lang = lang;
  document.documentElement.dir = I18N[lang].dir;
  $("#langCurrent").textContent = I18N[lang].label;
  $$(".lang-menu button").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));

  $$("[data-i18n]").forEach(el => {
    const val = t(el.dataset.i18n);
    if (val) el.textContent = val;
  });

  renderCategories();
  renderFilters();
  renderProducts();
  applySettings();
}

/* =========================================================
   تطبيق الإعدادات (الأرقام + الشعار + الإحصائيات)
   ========================================================= */
function applySettings() {
  const s = DATA.settings;

  /* الشعار */
  if (s.logo) {
    ["brandLogo", "footerLogo", "gateLogo"].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = '<img src="' + s.logo + '" alt="Rim Medical">';
    });
  }

  /* روابط واتساب */
  $("#floatWa").href = RimStore.waLink(s.customerWhatsapp, t("floatWaMsg"));
  $("#b2bWaBtn").href = RimStore.waLink(s.institutionalWhatsapp, t("b2b.waMsg"));
  $("#b2bNumber").textContent = "+" + s.institutionalWhatsapp;

  $("#footCustomerWa").href = RimStore.waLink(s.customerWhatsapp, t("floatWaMsg"));
  $("#footCustomerNum").textContent = "+" + s.customerWhatsapp;
  $("#footB2bWa").href = RimStore.waLink(s.institutionalWhatsapp, t("b2b.waMsg"));
  $("#footB2bNum").textContent = "+" + s.institutionalWhatsapp;

  /* روابط السوشيال ميديا */
  const socials = [
    { key:"facebook",  icon:"📘" },
    { key:"instagram", icon:"📸" },
    { key:"tiktok",    icon:"🎵" }
  ];
  const wrap = $("#socialLinks");
  wrap.innerHTML = "";
  const waAll = document.createElement("a");
  waAll.href = RimStore.waLink(s.customerWhatsapp, t("floatWaMsg"));
  waAll.target = "_blank"; waAll.rel = "noopener"; waAll.textContent = "💬";
  wrap.appendChild(waAll);
  socials.forEach(({ key, icon }) => {
    if (s.social && s.social[key]) {
      const a = document.createElement("a");
      a.href = s.social[key]; a.target = "_blank"; a.rel = "noopener"; a.textContent = icon;
      wrap.appendChild(a);
    }
  });
}

/* =========================================================
   عرض التصنيفات
   ========================================================= */
function renderCategories() {
  const grid = $("#catsGrid");
  grid.innerHTML = "";
  getCategories().forEach((cat, i) => {
    const card = document.createElement("div");
    card.className = "cat-card reveal" + (i % 3 ? " reveal-d" + (i % 3) : "");
    card.innerHTML =
      '<span class="c-ico">' + (cat.icon || "🩺") + '</span>' +
      '<h3></h3><p></p>' +
      '<span class="c-link">' + t("cats.browse") + ' <span>' + (I18N[currentLang].dir === "rtl" ? "←" : "→") + '</span></span>';
    card.querySelector("h3").textContent = cat.name[currentLang] || cat.name.ar;
    card.querySelector("p").textContent = (cat.desc && (cat.desc[currentLang] || cat.desc.ar)) || "";
    card.addEventListener("click", () => {
      currentFilter = cat.id;
      renderFilters();
      renderProducts();
      $("#products").scrollIntoView({ behavior: "smooth" });
    });
    grid.appendChild(card);
  });
  observeReveals();
}

/* =========================================================
   فلاتر المنتجات
   ========================================================= */
function renderFilters() {
  const bar = $("#filterBar");
  bar.innerHTML = "";
  const mk = (id, label) => {
    const b = document.createElement("button");
    b.className = "filter-chip" + (currentFilter === id ? " active" : "");
    b.textContent = label;
    b.addEventListener("click", () => { currentFilter = id; renderFilters(); renderProducts(); });
    bar.appendChild(b);
  };
  mk("all", t("products.all"));
  getCategories().forEach(c => mk(c.id, c.name[currentLang] || c.name.ar));
}

/* =========================================================
   عرض المنتجات
   ========================================================= */
function formatPrice(p) {
  if (p === null || p === undefined || p === "") {
    return '<span class="p-price ask">' + t("products.askPrice") + '</span>';
  }
  return '<span class="p-price">' + Number(p).toLocaleString("en-US") +
         ' <small>' + t("products.currency") + '</small></span>';
}

const WA_SVG = '<svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 2.9C8.8 2.9 3 8.7 3 15.9c0 2.3.6 4.5 1.7 6.5L3 29.1l6.9-1.8c1.9 1 4 1.6 6.1 1.6 7.2 0 13-5.8 13-13S23.2 2.9 16 2.9zm5.9 17.7c-.3.8-1.6 1.4-2.2 1.5-.6.1-1.3.1-2.1-.1-.5-.2-1.1-.4-1.9-.7-3.2-1.4-5.3-4.7-5.5-4.9-.1-.3-1.3-1.8-1.3-3.4s.8-2.4 1.1-2.7c.3-.3.7-.4.9-.4h.6c.2.1.4 0 .7.6.3.6.9 2.2 1 2.4.1.2.1.4 0 .6-.1.2-.1.3-.3.5-.2.1-.4.4-.5.5-.1.1-.3.3-.1.6.2.3.8 1.3 1.8 2.2 1.2 1.1 2.3 1.4 2.6 1.6.3.1.4.1.6-.1.1-.2.7-.9.9-1.2.2-.4.4-.3.7-.2.3.1 1.9.8 2.2 1 .3.1.5.2.6.4.1.1.1.7-.2 1.5z"/></svg>';

function renderProducts() {
  const grid = $("#productsGrid");
  grid.innerHTML = "";
  const list = DATA.products.filter(p => currentFilter === "all" || p.category === currentFilter);

  if (!list.length) {
    grid.innerHTML = '<div class="no-products">' + t("products.empty") + '</div>';
    return;
  }

  list.forEach((p, i) => {
    const name = p.name[currentLang] || p.name.ar;
    const desc = p.desc[currentLang] || p.desc.ar;
    const imgs = productImages(p);
    const waMsg = t("products.waMsg") + "\n\n▪️ " + name +
      (p.price ? "\n▪️ " + Number(p.price).toLocaleString("en-US") + " " + t("products.currency") : "");
    const waHref = RimStore.waLink(DATA.settings.customerWhatsapp, waMsg);

    const card = document.createElement("div");
    card.className = "product-card reveal" + (i % 3 ? " reveal-d" + (i % 3) : "");
    card.innerHTML =
      '<div class="p-media">' +
        (p.badge ? '<span class="p-badge ' + p.badge + '">' +
          (p.badge === "best" ? t("products.badgeBest") : t("products.badgeNew")) + '</span>' : "") +
        (imgs.length ? '<img src="' + imgs[0] + '" alt="" loading="lazy">'
                     : '<span class="p-emoji">' + (p.icon || "🩺") + '</span>') +
        (imgs.length > 1 ? '<span class="p-imgcount">📷 ' + imgs.length + '</span>' : "") +
        '<span class="p-cat-tag">' + catName(p.category) + '</span>' +
      '</div>' +
      '<div class="p-body">' +
        '<h3></h3>' +
        '<p class="p-desc"></p>' +
        '<div class="p-foot">' + formatPrice(p.price) +
          '<a class="btn-wa" target="_blank" rel="noopener">' + WA_SVG +
            '<span>' + t("products.order") + '</span></a>' +
        '</div>' +
      '</div>';
    card.querySelector("h3").textContent = name;
    card.querySelector(".p-desc").textContent = desc;
    card.querySelector(".btn-wa").href = waHref;
    card.querySelector(".p-media").addEventListener("click", (e) => {
      if (e.target.closest(".btn-wa")) return;
      openLightbox(p, name, desc);
    });
    grid.appendChild(card);
  });
  observeReveals();
}

/* =========================================================
   Lightbox لصور المنتجات
   ========================================================= */
const lightbox = $("#lightbox");
function openLightbox(p, name, desc) {
  const imgs = productImages(p);
  const show = (idx) => {
    $("#lbMedia").innerHTML = imgs.length
      ? '<img src="' + imgs[idx] + '" alt="">'
      : '<span class="p-emoji">' + (p.icon || "🩺") + '</span>';
    $$(".lb-thumb").forEach((th, i) => th.classList.toggle("active", i === idx));
  };
  const thumbs = $("#lbThumbs");
  thumbs.innerHTML = "";
  if (imgs.length > 1) {
    imgs.forEach((src, i) => {
      const b = document.createElement("button");
      b.className = "lb-thumb" + (i === 0 ? " active" : "");
      b.innerHTML = '<img src="' + src + '" alt="">';
      b.addEventListener("click", () => show(i));
      thumbs.appendChild(b);
    });
  }
  show(0);
  $("#lbTitle").textContent = name;
  $("#lbDesc").textContent = desc;
  lightbox.classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeLightbox() {
  lightbox.classList.remove("open");
  document.body.style.overflow = "";
}
$("#lbClose").addEventListener("click", closeLightbox);
lightbox.addEventListener("click", (e) => { if (e.target === lightbox) closeLightbox(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeLightbox(); });

/* =========================================================
   الترويسة: تبديل اللغة + القائمة الجانبية + التمرير
   ========================================================= */
const langSwitch = $("#langSwitch");
$("#langBtn").addEventListener("click", (e) => {
  e.stopPropagation();
  langSwitch.classList.toggle("open");
});
document.addEventListener("click", () => langSwitch.classList.remove("open"));
$$(".lang-menu button").forEach(b => {
  b.addEventListener("click", () => { setLang(b.dataset.lang); langSwitch.classList.remove("open"); });
});

const mainNav = $("#mainNav");
$("#burger").addEventListener("click", (e) => { e.stopPropagation(); mainNav.classList.toggle("open"); });
$$("a", mainNav).forEach(a => a.addEventListener("click", () => mainNav.classList.remove("open")));
document.addEventListener("click", (e) => {
  if (!e.target.closest("#mainNav") && !e.target.closest("#burger")) mainNav.classList.remove("open");
});

const header = $("#header");
window.addEventListener("scroll", () => {
  header.classList.toggle("scrolled", window.scrollY > 40);
}, { passive: true });

/* =========================================================
   حركات التمرير (Intersection Observer) + عدادات الأرقام
   ========================================================= */
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(en => {
    if (en.isIntersecting) {
      en.target.classList.add("visible");
      revealObserver.unobserve(en.target);
    }
  });
}, { threshold: 0.12 });

function observeReveals() {
  $$(".reveal:not(.visible)").forEach(el => revealObserver.observe(el));
}

function animateCounter(el, target) {
  const duration = 1600;
  const start = performance.now();
  function tick(now) {
    const k = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - k, 3);
    el.textContent = Math.round(target * eased).toLocaleString("en-US");
    if (k < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

const statsObserver = new IntersectionObserver((entries) => {
  entries.forEach(en => {
    if (!en.isIntersecting) return;
    $$(".counter", en.target).forEach(c => {
      animateCounter(c, Number(DATA.settings.stats[c.dataset.key]) || 0);
    });
    statsObserver.unobserve(en.target);
  });
}, { threshold: 0.4 });
statsObserver.observe($("#stats"));

/* =========================================================
   التشغيل
   ========================================================= */
$("#year").textContent = new Date().getFullYear();
setLang(currentLang);
observeReveals();

/* تحديث فوري إذا عُدّلت البيانات من لوحة التحكم في نافذة أخرى */
window.addEventListener("storage", (e) => {
  if (e.key === RimStore.STORAGE_KEY) {
    DATA = RimStore.getData();
    setLang(currentLang);
  }
});
</script>
